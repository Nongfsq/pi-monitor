<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        /* 隐藏原生颜色选择器的丑陋边框，使其充满容器 */
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 100%;
            height: 100%;
            cursor: pointer;
            border-radius: 0.5rem;
        }
        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: 0.5rem;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-200 font-mono p-6">
    {% raw %}
    <div id="dev-app" class="max-w-2xl mx-auto mt-10">
        
        <div class="flex justify-between items-center mb-8 border-b border-gray-700 pb-4">
            <h1 class="text-2xl font-bold text-white">⚡ Dev Console: Hardware Override</h1>
            <a href="/" class="text-blue-400 hover:text-blue-300 text-sm">← Dashboard</a>
        </div>

        <!-- Master Switch -->
        <div class="bg-gray-800 p-6 rounded-2xl border border-gray-700 shadow-2xl mb-6 flex justify-between items-center transition-all duration-300"
             :class="isOverride ? 'border-red-500 shadow-red-900/20' : ''">
            <div>
                <h2 class="text-lg font-bold text-white">Background Engine</h2>
                <p class="text-sm" :class="isOverride ? 'text-red-400' : 'text-green-400'">
                    {{ isOverride ? 'Suspended (Hardware Overridden)' : 'Running (Auto Polling)' }}
                </p>
            </div>
            <button @click="toggleOverride"
                class="px-6 py-3 rounded-xl font-bold text-white transition-all shadow-lg text-sm tracking-wide"
                :class="isOverride ? 'bg-red-600 hover:bg-red-500' : 'bg-gray-700 hover:bg-gray-600'">
                {{ isOverride ? 'RELEASE HARDWARE' : 'SUSPEND & OVERRIDE' }}
            </button>
        </div>

        <!-- Fluid Color Picker -->
        <div class="bg-gray-800 p-6 rounded-2xl border border-gray-700 shadow-2xl mb-6 transition-opacity duration-300"
             :class="{'opacity-40 pointer-events-none': !isOverride}">
            <div class="flex justify-between items-end mb-6">
                <div>
                    <h2 class="text-lg font-bold text-white">Fluid RGB Control</h2>
                    <p class="text-sm text-gray-400">Drag to mix colors in real-time.</p>
                </div>
                <div class="text-2xl font-bold uppercase tracking-widest text-gray-300">{{ currentColor }}</div>
            </div>
            
            <div class="h-48 w-full rounded-xl shadow-inner border-4 border-gray-900 overflow-hidden relative">
                <!-- 监听 input 事件实现毫秒级拖拽响应 -->
                <input type="color" v-model="currentColor" @input="handleColorInput">
            </div>

            <div class="mt-6 flex justify-end">
                <button @click="turnOffLED" 
                    class="bg-gray-900 hover:bg-black text-gray-400 border border-gray-700 font-bold py-2 px-6 rounded-lg transition-colors">
                    Turn LED OFF
                </button>
            </div>
        </div>

        <!-- Instant Trigger -->
        <div class="bg-gray-800 p-6 rounded-2xl border border-gray-700 shadow-2xl flex justify-between items-center">
            <div>
                <h2 class="text-lg font-bold text-white">Ping Test</h2>
                <p class="text-sm text-gray-400">Force immediate HTTP check.</p>
            </div>
            <button @click="triggerCheck" :disabled="isChecking"
                class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-6 rounded-xl transition-all shadow-lg">
                {{ isChecking ? 'Checking...' : 'Trigger Now' }}
            </button>
        </div>

    </div>
    {% endraw %}

    <script>
        const { createApp } = Vue
        createApp({
            data() {
                return {
                    isOverride: false,
                    isChecking: false,
                    currentColor: '#000000',
                    requestTimeout: null
                }
            },
            methods: {
                async toggleOverride() {
                    this.isOverride = !this.isOverride;
                    await axios.post('/api/dev/control', { action: 'override_toggle', state: this.isOverride });
                    if (!this.isOverride) this.turnOffLED();
                },
                handleColorInput(event) {
                    const color = event.target.value;
                    
                    // 防抖算法 (Debounce)：防止拖拽时每秒发出上百个请求压垮树莓派
                    // 设置 40ms 延迟，既保证视觉上的瞬间同步，又保护了后端 API
                    if (this.requestTimeout) {
                        clearTimeout(this.requestTimeout);
                    }
                    this.requestTimeout = setTimeout(() => {
                        axios.post('/api/dev/control', { action: 'set_color', color: color });
                    }, 40); 
                },
                async turnOffLED() {
                    this.currentColor = '#000000';
                    await axios.post('/api/dev/control', { action: 'set_color', color: 'off' });
                },
                async triggerCheck() {
                    this.isChecking = true;
                    let prev = this.isOverride;
                    if(prev) await axios.post('/api/dev/control', { action: 'override_toggle', state: false });
                    await axios.post('/api/dev/control', { action: 'instant_trigger' });
                    if(prev) await axios.post('/api/dev/control', { action: 'override_toggle', state: true });
                    this.isChecking = false;
                }
            }
        }).mount('#dev-app')
    </script>
</body>
</html>
